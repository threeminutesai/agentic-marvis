<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot Initiative — Project Status</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #f4f6f9;
    --card-bg: #ffffff;
    --ink: #1a2332;
    --ink-soft: #5b6b82;
    --border: #e3e8ef;
    --accent: #2f5fa8;
    --accent-soft: #eaf1fb;
    --green: #1d8a4a; --green-bg: #e7f6ed;
    --amber: #b6790a; --amber-bg: #fdf3e1;
    --red: #c23434; --red-bg: #fcebea;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 32px 60px; }

  header.dash-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
  }
  header.dash-header h1 { font-size: 22px; margin: 0 0 4px; }
  header.dash-header .subtitle { color: var(--ink-soft); font-size: 13px; }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; font-weight: 600; letter-spacing: .02em;
    padding: 5px 10px; border-radius: 999px; text-transform: uppercase;
  }
  .badge.on-track, .badge.good { color: var(--green); background: var(--green-bg); }
  .badge.watching, .badge.warning { color: var(--amber); background: var(--amber-bg); }
  .badge.at-risk, .badge.bad { color: var(--red); background: var(--red-bg); }
  .badge.neutral { color: var(--ink-soft); background: var(--border); }

  .grid { display: grid; gap: 16px; margin-bottom: 24px; }
  .grid.kpis { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
  .grid.charts { grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    box-shadow: 0 1px 2px rgba(16, 24, 40, .04);
  }

  .kpi-card .kpi-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .03em;
    color: var(--ink-soft); font-weight: 600; margin-bottom: 8px;
  }
  .kpi-card .kpi-value { font-size: 28px; font-weight: 700; line-height: 1.1; }
  .kpi-card .kpi-delta { font-size: 12px; margin-top: 6px; font-weight: 600; }
  .kpi-card .kpi-delta.up { color: var(--green); }
  .kpi-card .kpi-delta.down { color: var(--red); }
  .kpi-card .kpi-delta.flat { color: var(--ink-soft); }
  .kpi-card .kpi-note { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }

  .chart-card h3 { margin: 0 0 14px; font-size: 14px; }
  .chart-card canvas { max-height: 280px; }

  .section-title { font-size: 14px; font-weight: 700; margin: 28px 0 12px; }

  .progress-row { margin-bottom: 14px; }
  .progress-row .progress-label {
    display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px;
  }
  .progress-track { background: var(--border); border-radius: 6px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 6px; }

  table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data-table th {
    text-align: left; font-size: 11px; text-transform: uppercase; color: var(--ink-soft);
    border-bottom: 1px solid var(--border); padding: 8px 10px;
  }
  table.data-table td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  table.data-table tr:last-child td { border-bottom: none; }
  .pill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; display: inline-block; }

  footer.dash-footer { margin-top: 32px; font-size: 11px; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="wrap">
  <header class="dash-header">
    <div>
      <h1 id="dash-title"></h1>
      <div class="subtitle" id="dash-subtitle"></div>
    </div>
    <div class="badges" id="dash-badges"></div>
  </header>

  <div class="grid kpis" id="kpi-grid"></div>
  <div class="grid charts" id="chart-grid"></div>
  <div id="tables-section"></div>

  <footer class="dash-footer" id="dash-footer"></footer>
</div>

<script>
/*
  Fill DASHBOARD_DATA below with real numbers derived from the source
  Excel file. See references/data_schema.md in the skill for the full
  field reference. Every number here should trace back to a cell or a
  computed aggregate in the extracted data - never invent or round in a
  way that changes what a director would conclude.
*/
const DASHBOARD_DATA = {
  "meta": {
    "title": "AI Chatbot Initiative — Project Status",
    "subtitle": "Source: project-status.xlsx",
    "badges": [
      {"label": "Schedule: Watching", "status": "watching"},
      {"label": "Budget: On Track", "status": "on track"},
      {"label": "Top Risk: At Risk", "status": "at risk"}
    ],
    "footer": "Generated from project-status.xlsx. All figures are taken directly from the source workbook (Status sheet)."
  },
  "kpis": [
    {
      "label": "Overall Project Progress",
      "value": "45%",
      "note": "Across all initiative workstreams"
    },
    {
      "label": "AI Chatbot Completion",
      "value": "65%",
      "note": "Core chatbot build status"
    },
    {
      "label": "Total AI Dev Budget",
      "value": "$275,000",
      "note": "Approved budget for AI development"
    },
    {
      "label": "Budget Remaining",
      "value": "$151,250",
      "note": "$123,750 spent to date (45% of budget used)"
    }
  ],
  "charts": [
    {
      "title": "Team Utilization",
      "type": "bar",
      "data": {
        "labels": ["AI Team", "IT Team", "Support Team"],
        "datasets": [
          {
            "label": "Utilization %",
            "data": [90, 68, 35],
            "backgroundColor": ["#2f5fa8", "#1d8a4a", "#b6790a"]
          }
        ]
      },
      "options": {
        "scales": { "y": { "beginAtZero": true, "max": 100 } }
      }
    },
    {
      "title": "Budget Allocation",
      "type": "doughnut",
      "data": {
        "labels": ["Spent To Date", "Remaining"],
        "datasets": [
          {
            "data": [123750, 151250],
            "backgroundColor": ["#2f5fa8", "#e3e8ef"]
          }
        ]
      }
    }
  ],
  "progress": [
    {"label": "Overall Project Progress", "percent": 45},
    {"label": "AI Chatbot Completion", "percent": 65},
    {"label": "AI Development Budget Used", "percent": 45}
  ],
  "tables": [
    {
      "title": "Top Risks",
      "columns": [
        {"key": "risk", "label": "Risk"},
        {"key": "owner", "label": "Owner"},
        {"key": "status", "label": "Status", "statusPill": true}
      ],
      "rows": [
        {"risk": "Vendor SLA breach on model latency", "owner": "J. Tan", "status": "At Risk"},
        {"risk": "Headcount backfill delayed", "owner": "M. Reyes", "status": "Watching"},
        {"risk": "Security review pending sign-off", "owner": "K. Adams", "status": "On Track"}
      ]
    },
    {
      "title": "Team Utilization Notes",
      "columns": [
        {"key": "team", "label": "Team"},
        {"key": "utilization", "label": "Utilization %"},
        {"key": "notes", "label": "Notes"}
      ],
      "rows": [
        {"team": "AI Team", "utilization": "90%", "notes": "Motivated but under pressure"},
        {"team": "IT Team", "utilization": "68%", "notes": "Improved server reliance"},
        {"team": "Support Team", "utilization": "35%", "notes": "Providing active chatbot feedback"}
      ]
    }
  ]
};

function pillClass(status) {
  const s = (status || "").toLowerCase();
  if (["on track", "good", "healthy", "complete"].includes(s)) return "good";
  if (["watching", "warning", "at risk (low)", "minor"].includes(s)) return "warning";
  if (["at risk", "bad", "delayed", "blocked", "critical"].includes(s)) return "bad";
  return "neutral";
}

function renderHeader(d) {
  document.title = d.meta?.title || "Dashboard";
  document.getElementById("dash-title").textContent = d.meta?.title || "";
  document.getElementById("dash-subtitle").textContent = d.meta?.subtitle || "";
  const badgeWrap = document.getElementById("dash-badges");
  (d.meta?.badges || []).forEach(b => {
    const el = document.createElement("span");
    el.className = "badge " + pillClass(b.status);
    el.textContent = b.label;
    badgeWrap.appendChild(el);
  });
  document.getElementById("dash-footer").textContent = d.meta?.footer || "";
}

function renderKpis(d) {
  const grid = document.getElementById("kpi-grid");
  (d.kpis || []).forEach(k => {
    const card = document.createElement("div");
    card.className = "card kpi-card";
    let deltaHtml = "";
    if (k.delta) {
      const dir = k.delta.direction || "flat"; // "up" | "down" | "flat"
      const arrow = dir === "up" ? "↑" : dir === "down" ? "↓" : "→";
      deltaHtml = `<div class="kpi-delta ${dir}">${arrow} ${k.delta.text}</div>`;
    }
    card.innerHTML = `
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      ${deltaHtml}
      ${k.note ? `<div class="kpi-note">${k.note}</div>` : ""}
    `;
    grid.appendChild(card);
  });
}

function renderCharts(d) {
  const grid = document.getElementById("chart-grid");
  (d.charts || []).forEach((c, i) => {
    const card = document.createElement("div");
    card.className = "card chart-card";
    const canvasId = `chart-${i}`;
    card.innerHTML = `<h3>${c.title}</h3><canvas id="${canvasId}"></canvas>`;
    grid.appendChild(card);

    const ctx = document.getElementById(canvasId).getContext("2d");
    new Chart(ctx, {
      type: c.type, // "line" | "bar" | "doughnut" | "pie" | "horizontalBar" (use type:"bar", indexAxis:"y")
      data: c.data, // standard Chart.js data object: {labels:[...], datasets:[{label, data, ...}]}
      options: Object.assign({
        responsive: true,
        plugins: { legend: { display: (c.data.datasets || []).length > 1 || c.type === "doughnut" || c.type === "pie" } }
      }, c.options || {})
    });
  });
}

function renderTables(d) {
  const wrap = document.getElementById("tables-section");
  (d.tables || []).forEach(t => {
    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = t.title;
    wrap.appendChild(title);

    const card = document.createElement("div");
    card.className = "card";
    const cols = t.columns; // [{key, label, statusPill?: bool}]
    let thead = "<tr>" + cols.map(c => `<th>${c.label}</th>`).join("") + "</tr>";
    let rows = t.rows.map(r => {
      return "<tr>" + cols.map(c => {
        const val = r[c.key] ?? "";
        if (c.statusPill) {
          return `<td><span class="pill ${pillClass(val)}">${val}</span></td>`;
        }
        return `<td>${val}</td>`;
      }).join("") + "</tr>";
    }).join("");
    card.innerHTML = `<table class="data-table"><thead>${thead}</thead><tbody>${rows}</tbody></table>`;
    wrap.appendChild(card);
  });
}

function renderProgress(d) {
  if (!d.progress || !d.progress.length) return;
  const wrap = document.getElementById("tables-section");
  const title = document.createElement("div");
  title.className = "section-title";
  title.textContent = "Progress";
  wrap.appendChild(title);

  const card = document.createElement("div");
  card.className = "card";
  d.progress.forEach(p => {
    const row = document.createElement("div");
    row.className = "progress-row";
    row.innerHTML = `
      <div class="progress-label"><span>${p.label}</span><span>${p.percent}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${p.percent}%"></div></div>
    `;
    card.appendChild(row);
  });
  wrap.appendChild(card);
}

renderHeader(DASHBOARD_DATA);
renderKpis(DASHBOARD_DATA);
renderCharts(DASHBOARD_DATA);
renderProgress(DASHBOARD_DATA);
renderTables(DASHBOARD_DATA);
</script>
</body>
</html>
