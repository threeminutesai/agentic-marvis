<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Schema Drift Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    /* Warm paper + ink, one dominant deep navy, one sharp rust accent.
       Deliberately not Inter/Arial/generic-indigo - see frontend-slides
       design principles this template borrows from. */
    --bg: #f6f3ec;
    --bg-line: rgba(20, 24, 31, .035);
    --card-bg: #fffdf8;
    --ink: #14181f;
    --ink-soft: #6b6457;
    --border: #e6e0d2;
    --navy: #1f3a5f;
    --navy-soft: #eaeff5;
    --rust: #c1502e;
    --rust-soft: #f8e9e2;
    --green: #2f6b4f; --green-bg: #e3efe6;
    --amber: #a86a14; --amber-bg: #faf0dc;
    --red: #b23a2e; --red-bg: #fbe9e5;
    --font-display: "Archivo", "IBM Plex Sans", sans-serif;
    --font-body: "IBM Plex Sans", sans-serif;
    --font-mono: "IBM Plex Mono", monospace;
  }
  * { box-sizing: border-box; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }
  body {
    margin: 0;
    font-family: var(--font-body);
    background:
      linear-gradient(var(--bg-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-line) 1px, transparent 1px),
      var(--bg);
    background-size: 48px 48px, 48px 48px, auto;
    color: var(--ink);
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 32px 32px 60px; }

  header.dash-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 18px;
    border-bottom: 3px solid var(--navy);
  }
  header.dash-header h1 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -.01em;
    margin: 0 0 5px;
    color: var(--navy);
  }
  header.dash-header .subtitle { color: var(--ink-soft); font-size: 13px; }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge {
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 600; letter-spacing: .03em;
    padding: 5px 11px; border-radius: 4px; text-transform: uppercase;
  }
  .badge.on-track, .badge.good { color: var(--green); background: var(--green-bg); }
  .badge.watching, .badge.warning { color: var(--amber); background: var(--amber-bg); }
  .badge.at-risk, .badge.bad { color: var(--red); background: var(--red-bg); }
  .badge.neutral { color: var(--ink-soft); background: var(--border); }

  .grid { display: grid; gap: 16px; margin-bottom: 24px; }
  .grid.kpis { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
  .grid.charts { grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); }

  @keyframes revealUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 18px 20px;
    box-shadow: 0 1px 2px rgba(20, 24, 31, .05);
    animation: revealUp .45s cubic-bezier(.16, 1, .3, 1) backwards;
    animation-delay: calc(var(--card-index, 0) * 55ms);
    transition: transform .22s ease, box-shadow .22s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(20, 24, 31, .08);
  }

  .kpi-card { border-left: 3px solid var(--rust); }
  .kpi-card .kpi-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
    color: var(--ink-soft); font-weight: 600; margin-bottom: 9px;
  }
  .kpi-card .kpi-value {
    font-family: var(--font-mono); font-size: 27px; font-weight: 600; line-height: 1.1;
  }
  .kpi-card .kpi-delta { font-size: 12px; margin-top: 7px; font-weight: 600; }
  .kpi-card .kpi-delta.up { color: var(--green); }
  .kpi-card .kpi-delta.down { color: var(--red); }
  .kpi-card .kpi-delta.flat { color: var(--ink-soft); }
  .kpi-card .kpi-note { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }

  .chart-card h3 {
    font-family: var(--font-display); font-weight: 700; font-size: 14px;
    margin: 0 0 14px; color: var(--navy);
  }
  .chart-card canvas { max-height: 280px; }

  .section-title {
    font-family: var(--font-display); font-weight: 700; font-size: 15px;
    margin: 30px 0 12px; color: var(--navy);
  }

  .progress-row { margin-bottom: 14px; }
  .progress-row .progress-label {
    display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px;
  }
  .progress-row .progress-label span:last-child { font-family: var(--font-mono); font-weight: 600; }
  .progress-track { background: var(--navy-soft); border-radius: 3px; height: 8px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: var(--navy); border-radius: 3px;
    transition: width .5s cubic-bezier(.16, 1, .3, 1);
  }

  table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data-table th {
    text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .03em;
    color: var(--ink-soft); border-bottom: 2px solid var(--border); padding: 9px 10px;
  }
  table.data-table td { padding: 11px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  table.data-table tr:last-child td { border-bottom: none; }
  table.data-table tbody tr { transition: background .15s ease; }
  table.data-table tbody tr:hover { background: var(--navy-soft); }
  .pill {
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 4px; display: inline-block;
  }

  footer.dash-footer { margin-top: 32px; font-size: 11px; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="wrap">
  <header class="dash-header">
    <div>
      <h1 id="dash-title"></h1>
      <div class="subtitle" id="dash-subtitle"></div>
    </div>
    <div class="badges" id="dash-badges"></div>
  </header>

  <div class="grid kpis" id="kpi-grid"></div>
  <div class="grid charts" id="chart-grid"></div>
  <div id="tables-section"></div>

  <footer class="dash-footer" id="dash-footer"></footer>
</div>

<script>
/*
  Fill DASHBOARD_DATA below with real numbers derived from the source
  Excel file. See references/data_schema.md in the skill for the full
  field reference. Every number here should trace back to a cell or a
  computed aggregate in the extracted data - never invent or round in a
  way that changes what a director would conclude.
*/
const DASHBOARD_DATA = {"meta": {"title": "Finance Dashboard v2 (schema-drift test)", "subtitle": "5 datasets, 5 regions", "badges": []}, "kpis": [{"label": "Total Revenue", "value": "$15.1M"}, {"label": "Marketing Spend", "value": "$2.2M"}], "charts": [{"title": "Revenue/COGS/Gross Profit/Marketing", "type": "line", "data": {"labels": ["Jan", "Feb", "Mar", "Apr"], "datasets": [{"label": "Revenue", "data": [650000, 620000, 680000, 740000]}, {"label": "COGS", "data": [700000, 680000, 720000, 760000]}, {"label": "Gross Profit", "data": [-50000, -60000, -40000, -20000]}, {"label": "Marketing", "data": [80000, 75000, 82000, 90000]}]}}, {"title": "Revenue by Region (5 regions)", "type": "doughnut", "data": {"labels": ["North America", "APAC", "Europe", "LATAM", "MEA"], "datasets": [{"data": [5600000, 3400000, 3100000, 2200000, 800000]}]}}], "progress": [], "tables": []};

// Default chart color cycle so charts read as one designed system even
// when a dataset doesn't specify its own colors - navy/rust/green/amber
// pulled straight from the page's own CSS variables, not Chart.js defaults.
// The source workbook's category count isn't fixed (a region breakdown
// might grow from 4 to 12 next quarter), so this generates unlimited
// distinct colors rather than capping at a hardcoded array: cycle through
// the brand hues first, then vary lightness on repeat so a 12-category
// chart still reads as distinct slices instead of repeating flat colors.
const PALETTE_HUES = [210, 14, 152, 38, 280, 195]; // navy, rust, green, amber, plum, teal
function paletteColor(i) {
  const hue = PALETTE_HUES[i % PALETTE_HUES.length];
  const cycle = Math.floor(i / PALETTE_HUES.length);
  const lightness = 38 + (cycle * 14) % 35;
  return `hsl(${hue} 50% ${lightness}%)`;
}
Chart.defaults.font.family = "'IBM Plex Sans', sans-serif";
Chart.defaults.color = "#6b6457";
Chart.defaults.borderColor = "#e6e0d2";

function applyDefaultColors(dataset, idx) {
  const color = paletteColor(idx);
  if (dataset.data && Array.isArray(dataset.data) && dataset.data.length > 1 && !dataset.backgroundColor && (dataset.type || "bar") !== "line") {
    // multi-slice dataset (doughnut/pie/bar-by-category): cycle the palette per slice
    dataset.backgroundColor = dataset.data.map((_, i) => paletteColor(i));
  }
  if (!dataset.borderColor) dataset.borderColor = color;
  if (!dataset.backgroundColor) dataset.backgroundColor = color;
}

function pillClass(status) {
  const s = (status || "").toLowerCase();
  if (["on track", "good", "healthy", "complete"].includes(s)) return "good";
  if (["watching", "warning", "at risk (low)", "minor"].includes(s)) return "warning";
  if (["at risk", "bad", "delayed", "blocked", "critical"].includes(s)) return "bad";
  return "neutral";
}

function renderHeader(d) {
  document.title = d.meta?.title || "Dashboard";
  document.getElementById("dash-title").textContent = d.meta?.title || "";
  document.getElementById("dash-subtitle").textContent = d.meta?.subtitle || "";
  const badgeWrap = document.getElementById("dash-badges");
  (d.meta?.badges || []).forEach(b => {
    const el = document.createElement("span");
    el.className = "badge " + pillClass(b.status);
    el.textContent = b.label;
    badgeWrap.appendChild(el);
  });
  document.getElementById("dash-footer").textContent = d.meta?.footer || "";
}

let cardIndex = 0;
function nextCardDelay(el) {
  el.style.setProperty("--card-index", cardIndex++);
}

function renderKpis(d) {
  const grid = document.getElementById("kpi-grid");
  (d.kpis || []).forEach(k => {
    const card = document.createElement("div");
    card.className = "card kpi-card";
    nextCardDelay(card);
    let deltaHtml = "";
    if (k.delta) {
      const dir = k.delta.direction || "flat"; // "up" | "down" | "flat"
      const arrow = dir === "up" ? "↑" : dir === "down" ? "↓" : "→";
      deltaHtml = `<div class="kpi-delta ${dir}">${arrow} ${k.delta.text}</div>`;
    }
    card.innerHTML = `
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      ${deltaHtml}
      ${k.note ? `<div class="kpi-note">${k.note}</div>` : ""}
    `;
    grid.appendChild(card);
  });
}

function renderCharts(d) {
  const grid = document.getElementById("chart-grid");
  (d.charts || []).forEach((c, i) => {
    const card = document.createElement("div");
    card.className = "card chart-card";
    nextCardDelay(card);
    const canvasId = `chart-${i}`;
    card.innerHTML = `<h3>${c.title}</h3><canvas id="${canvasId}"></canvas>`;
    grid.appendChild(card);

    (c.data.datasets || []).forEach((ds, dsIdx) => applyDefaultColors(ds, dsIdx));

    const ctx = document.getElementById(canvasId).getContext("2d");
    new Chart(ctx, {
      type: c.type, // "line" | "bar" | "doughnut" | "pie" | "horizontalBar" (use type:"bar", indexAxis:"y")
      data: c.data, // standard Chart.js data object: {labels:[...], datasets:[{label, data, ...}]}
      options: Object.assign({
        responsive: true,
        plugins: { legend: { display: (c.data.datasets || []).length > 1 || c.type === "doughnut" || c.type === "pie" } }
      }, c.options || {})
    });
  });
}

function renderTables(d) {
  const wrap = document.getElementById("tables-section");
  (d.tables || []).forEach(t => {
    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = t.title;
    wrap.appendChild(title);

    const card = document.createElement("div");
    card.className = "card";
    nextCardDelay(card);
    const cols = t.columns; // [{key, label, statusPill?: bool}]
    let thead = "<tr>" + cols.map(c => `<th>${c.label}</th>`).join("") + "</tr>";
    let rows = t.rows.map(r => {
      return "<tr>" + cols.map(c => {
        const val = r[c.key] ?? "";
        if (c.statusPill) {
          return `<td><span class="pill ${pillClass(val)}">${val}</span></td>`;
        }
        return `<td>${val}</td>`;
      }).join("") + "</tr>";
    }).join("");
    card.innerHTML = `<table class="data-table"><thead>${thead}</thead><tbody>${rows}</tbody></table>`;
    wrap.appendChild(card);
  });
}

function renderProgress(d) {
  if (!d.progress || !d.progress.length) return;
  const wrap = document.getElementById("tables-section");
  const title = document.createElement("div");
  title.className = "section-title";
  title.textContent = "Progress";
  wrap.appendChild(title);

  const card = document.createElement("div");
  card.className = "card";
  nextCardDelay(card);
  d.progress.forEach(p => {
    const row = document.createElement("div");
    row.className = "progress-row";
    row.innerHTML = `
      <div class="progress-label"><span>${p.label}</span><span>${p.percent}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${p.percent}%"></div></div>
    `;
    card.appendChild(row);
  });
  wrap.appendChild(card);
}

renderHeader(DASHBOARD_DATA);
renderKpis(DASHBOARD_DATA);
renderCharts(DASHBOARD_DATA);
renderProgress(DASHBOARD_DATA);
renderTables(DASHBOARD_DATA);
</script>
</body>
</html>
