name: Build macOS Release

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS package
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts
        run: npm run dist:mac -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Read package version
        run: echo "MARVIS_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Create Windows-style macOS ZIP
        run: |
          rm -rf release/macos-zip-stage
          mkdir -p release/macos-zip-stage/data
          mkdir -p release/macos-zip-stage/skills
          cp -R release/mac-arm64/Marvis.app release/macos-zip-stage/
          cp -R data/music release/macos-zip-stage/data/music
          cp data/music-library.json release/macos-zip-stage/data/music-library.json
          cp -R skills/agentic-marvis-brief release/macos-zip-stage/skills/agentic-marvis-brief
          cp -R skills/agentic-marvis-dashboard release/macos-zip-stage/skills/agentic-marvis-dashboard
          (cd release/macos-zip-stage && zip -qry ../Marvis-v${MARVIS_VERSION}-macos-arm64.zip Marvis.app data skills)

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marvis-macos-release
          path: |
            release/*.dmg
            release/Marvis-v${{ env.MARVIS_VERSION }}-macos-arm64.zip
          if-no-files-found: error
